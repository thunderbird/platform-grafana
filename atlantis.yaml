# Atlantis configuration for platform-grafana
# Manages Grafana dashboards and folders via Terraform.
#
# Atlantis ECS runs in the same account (shared-services 826971876779)
# so no cross-account assume-role is needed — the task role has direct access.

version: 3

projects:
  - name: grafana
    dir: terraform
    workflow: grafana
    terraform_version: v1.14.9
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "dashboards/**/*.json"
      enabled: true
    apply_requirements: [approved, mergeable]

workflows:
  grafana:
    plan:
      steps:
        - init
        - plan
    apply:
      steps:
        - apply
